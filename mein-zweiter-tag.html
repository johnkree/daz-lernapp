<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mein zweiter Tag</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFF8F0;--bgc:#FFF;--pri:#FF6B35;--pril:#FFF0E8;--prid:#E55A2B;
  --sec:#2EC4B6;--secl:#E8FAF8;--secd:#22A599;--acc:#FFBA49;--accl:#FFF3DC;
  --txt:#2D3436;--txtl:#636E72;--txtlr:#B2BEC3;--ok:#00B894;--okl:#E8FBF5;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:linear-gradient(135deg,var(--pri),#FF8C5A);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-emoji{font-size:28px}
.header h1{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;line-height:1.1}
.scene-label{font-size:12px;opacity:.85;font-weight:600}
.prog-bar{background:rgba(255,255,255,.3);height:6px;border-radius:3px;width:100px;overflow:hidden}
.prog-fill{background:#fff;height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);width:0}
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;max-width:88%;animation:msgIn .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.npc{align-self:flex-start}.msg.player{align-self:flex-end;flex-direction:row-reverse}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.npc .av{background:var(--secl)}.player .av{background:var(--pril)}
.bub{padding:12px 16px;border-radius:16px;line-height:1.55;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.npc .bub{background:var(--bgc);border-bottom-left-radius:4px;border:1px solid rgba(0,0,0,.04)}
.player .bub{background:var(--pri);color:#fff;border-bottom-right-radius:4px}
.spk{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:var(--secd)}
.dots{display:flex;gap:5px;padding:4px 0}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--txtlr);animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}
.fb-inline{align-self:center;padding:8px 18px;border-radius:50px;font-size:13px;font-weight:700;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;text-align:center;max-width:90%}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.fb-inline.success{background:var(--okl);color:var(--ok);border:2px solid var(--ok)}
.choice-wrap{display:flex;flex-direction:column;gap:10px;padding:8px 0;max-width:85%;align-self:center;animation:fadeIn .6s ease both}
.choice-btn{background:#fff;border:2px solid var(--pri);color:var(--pri);padding:12px 20px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.choice-btn:hover,.choice-btn:active{background:var(--pri);color:#fff;transform:scale(1.03)}
.choice-btn.sec{border-color:var(--sec);color:var(--secd)}
.choice-btn.sec:hover,.choice-btn.sec:active{background:var(--sec);color:#fff}
.helps{flex-shrink:0;padding:8px 16px;background:var(--bg);border-top:1px solid rgba(0,0,0,.05)}
.helps-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txtlr);margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#fff;border:2px solid var(--sec);color:var(--secd);padding:6px 14px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.06);font-family:'Nunito',sans-serif}
.chip:hover,.chip:active{background:var(--sec);color:#fff;transform:scale(1.05)}
.chip.used{opacity:.4;pointer-events:none;transform:scale(.95)}
.chip.hint-chip{border-color:var(--acc);color:#B8860B;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
.chip.hint-chip:hover,.chip.hint-chip:active{background:var(--acc);color:#fff}
.inp-area{flex-shrink:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:10px;align-items:flex-end}
.inp-wrap{flex:1}
.inp-wrap input{width:100%;padding:14px 18px;border:2px solid #E8E8E8;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--bg);color:var(--txt)}
.inp-wrap input:focus{border-color:var(--pri);box-shadow:0 0 0 4px var(--pril)}
.inp-wrap input::placeholder{color:var(--txtlr);font-weight:400}
.send{width:50px;height:50px;border:none;border-radius:50%;background:var(--pri);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.send:hover{background:var(--prid);transform:scale(1.05)}.send:active{transform:scale(.95)}
.send:disabled{background:var(--txtlr);transform:none;cursor:default;box-shadow:none}
.scene-hdr{align-self:center;text-align:center;padding:20px;animation:fadeIn .8s ease both}
.scene-hdr .em{font-size:40px;margin-bottom:8px}
.scene-hdr .ttl{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--pri)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.narr{align-self:center;text-align:center;padding:16px 20px;animation:fadeIn .8s ease both;font-style:italic;color:var(--txtl);font-size:14px;max-width:90%}
.screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 24px;flex:1;gap:12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen .big{font-size:48px}
.screen h2{font-family:'Baloo 2',cursive;font-size:28px;color:var(--pri)}
.screen p{color:var(--txtl);font-size:16px;line-height:1.6;max-width:320px}
.screen .big.float{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes cBounce{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.screen .big.celebrate{animation:cBounce .8s cubic-bezier(.34,1.56,.64,1) both}
.avatar-setup{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:360px;padding-bottom:24px}
.av-section{width:100%;text-align:center}
.av-section label{display:block;font-weight:700;font-size:14px;color:var(--txtl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.av-options{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.av-opt{width:56px;height:56px;border-radius:50%;border:3px solid #E8E8E8;background:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.av-opt:hover{transform:scale(1.1)}.av-opt.sel{border-color:var(--pri);box-shadow:0 0 0 3px var(--pril);transform:scale(1.1)}
.av-preview{font-size:48px;margin:4px 0}
.av-input{width:100%;padding:12px 18px;border:2px solid #E8E8E8;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;text-align:center;background:var(--bg);color:var(--txt);transition:border-color .2s}
.av-input:focus{border-color:var(--pri)}
.btn{border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:all .2s}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(.98)}
.btn-pri{background:var(--pri);color:#fff;padding:16px 40px;font-size:18px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.btn-pri:hover{background:var(--prid)}
.btn-sec{background:var(--pri);color:#fff;padding:14px 32px;font-size:16px;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:8px}
.btn:disabled{opacity:.4;cursor:default;transform:none!important}
.stats{display:flex;gap:24px;margin:12px 0}
.stat{text-align:center}
.stat .num{font-family:'Baloo 2',cursive;font-size:36px;font-weight:800;color:var(--sec);line-height:1}
.stat .lbl{font-size:12px;color:var(--txtl);font-weight:600}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:var(--txtlr);border-radius:2px}
.errmsg{color:var(--pri);font-size:13px;font-weight:600;margin-top:4px;min-height:20px}

/* ROOM MAP */
.room-map{align-self:center;background:#fff;border-radius:16px;padding:14px 20px;border:2px solid var(--secl);font-size:13px;color:var(--txtl);max-width:90%;animation:fadeIn .8s ease both;line-height:1.8}
.room-map strong{color:var(--pri);font-size:14px;display:block;margin-bottom:4px}
.room-found{color:var(--ok);text-decoration:line-through;opacity:.6}
</style>
</head>
<body>

<!-- AVATAR SCREEN -->
<div class="screen" id="avatarScreen">
  <div class="big float">&#x1F392;</div>
  <h2>Mein zweiter Tag</h2>
  <p>Wo ist meine Schultasche?</p>
  <div class="avatar-setup">
    <div class="av-section">
      <label>Wer bist du?</label>
      <div class="av-options" id="genderOpts"></div>
    </div>
    <div class="av-section">
      <label>Aussehen</label>
      <div class="av-options" id="skinOpts"></div>
    </div>
    <div class="av-section">
      <div class="av-preview" id="avPreview">&#x1F9D1;</div>
    </div>
    <div class="av-section">
      <label>Dein Vorname</label>
      <input class="av-input" id="avFirstName" type="text" placeholder="Vorname" autocomplete="off">
    </div>
    <div class="av-section">
      <label>Dein Nachname</label>
      <input class="av-input" id="avLastName" type="text" placeholder="Nachname" autocomplete="off">
    </div>
    <div class="av-section">
      <label>Deine Klasse</label>
      <input class="av-input" id="avClass" type="text" placeholder="z.B. 1A oder 2C" autocomplete="off">
    </div>
    <div class="errmsg" id="avError"></div>
    <button class="btn btn-pri" id="avStartBtn">Los geht's! &#x1F680;</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" style="display:none;flex-direction:column;height:100vh;height:100dvh;">
  <div class="header">
    <div class="header-left">
      <div class="header-emoji" id="sceneEmoji">&#x1F3E2;</div>
      <div><h1>Mein zweiter Tag</h1><div class="scene-label" id="sceneLabel">Start</div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  </div>
  <div class="chat" id="chatArea"></div>
  <div class="helps" id="helpsBox">
    <div class="helps-lbl" id="helpsLbl">&#x1F4A1; W&ouml;rter zum Antippen</div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="inp-area">
    <div class="inp-wrap"><input type="text" id="userInput" placeholder="Schreib hier..." autocomplete="off" autocapitalize="off" enterkeyhint="send"></div>
    <button class="send" id="sendBtn">&#x27A4;</button>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen" id="endScreen" style="display:none;">
  <div class="big celebrate">&#x1F392;</div>
  <h2>Kapitel 2 geschafft!</h2>
  <p id="endText">Die Schultasche ist wieder da!</p>
  <div class="stats">
    <div class="stat"><div class="num" id="sScore">0%</div><div class="lbl">Richtig beim 1. Versuch</div></div>
    <div class="stat"><div class="num" id="sRooms">0</div><div class="lbl">R&auml;ume besucht</div></div>
    <div class="stat"><div class="num" id="sMsgs">0</div><div class="lbl">Nachrichten</div></div>
  </div>
  <button class="btn btn-sec" id="restartBtn">Nochmal spielen &#x1F504;</button>
</div>

<script>
(function(){
  "use strict";

  var SKIN_MODS = ["", "\uD83C\uDFFB", "\uD83C\uDFFC", "\uD83C\uDFFD", "\uD83C\uDFFE", "\uD83C\uDFFF"];
  var GENDER_EMOJIS = [
    { label: "Bub",     bases: ["\uD83D\uDC66"] },
    { label: "M\u00E4dchen", bases: ["\uD83D\uDC67"] }
  ];

  var player = { firstName: "", lastName: "", playerClass: "", emoji: "\uD83E\uDDD1", gender: 0, skin: 0 };

  function buildEmoji() {
    return GENDER_EMOJIS[player.gender].bases[0] + SKIN_MODS[player.skin];
  }

  // ---- AVATAR SCREEN ----
  var genderOpts  = document.getElementById("genderOpts");
  var skinOpts    = document.getElementById("skinOpts");
  var avPreview   = document.getElementById("avPreview");
  var avFirstName = document.getElementById("avFirstName");
  var avLastName  = document.getElementById("avLastName");
  var avClass     = document.getElementById("avClass");
  var avError     = document.getElementById("avError");

  function renderAvatarOptions() {
    genderOpts.innerHTML = "";
    for (var g = 0; g < GENDER_EMOJIS.length; g++) {
      (function(gi) {
        var btn = document.createElement("button");
        btn.className = "av-opt" + (player.gender === gi ? " sel" : "");
        btn.textContent = GENDER_EMOJIS[gi].bases[0];
        btn.title = GENDER_EMOJIS[gi].label;
        btn.addEventListener("click", function() { player.gender = gi; renderAvatarOptions(); });
        genderOpts.appendChild(btn);
      })(g);
    }
    skinOpts.innerHTML = "";
    for (var s = 0; s < SKIN_MODS.length; s++) {
      (function(si) {
        var btn = document.createElement("button");
        btn.className = "av-opt" + (player.skin === si ? " sel" : "");
        btn.textContent = GENDER_EMOJIS[player.gender].bases[0] + SKIN_MODS[si];
        btn.addEventListener("click", function() { player.skin = si; renderAvatarOptions(); });
        skinOpts.appendChild(btn);
      })(s);
    }
    player.emoji = buildEmoji();
    avPreview.textContent = player.emoji;
  }

  renderAvatarOptions();

  document.getElementById("avStartBtn").addEventListener("click", function() {
    var fn = avFirstName.value.trim();
    var ln = avLastName.value.trim();
    var cl = avClass.value.trim().toUpperCase();
    if (!fn) { avError.textContent = "Bitte gib deinen Vornamen ein!"; return; }
    if (!ln) { avError.textContent = "Bitte gib deinen Nachnamen ein!"; return; }
    if (!cl) { avError.textContent = "Bitte gib deine Klasse ein!"; return; }
    player.firstName = fn;
    player.lastName  = ln;
    player.playerClass = cl;
    avError.textContent = "";
    startGame();
  });

  // ---- GAME ENGINE ----
  var sceneIdx = 0, stepIdx = 0, totalMsgs = 0, attempts = 0, inputLocked = false;
  var totalChecks = 0, firstTryPasses = 0;

  var avatarScreen = document.getElementById("avatarScreen");
  var gameScreen   = document.getElementById("gameScreen");
  var endScreen    = document.getElementById("endScreen");
  var chatArea     = document.getElementById("chatArea");
  var userInput    = document.getElementById("userInput");
  var sendBtn      = document.getElementById("sendBtn");
  var chipsEl      = document.getElementById("chips");
  var helpsLbl     = document.getElementById("helpsLbl");
  var sceneEmojiEl = document.getElementById("sceneEmoji");
  var sceneLabelEl = document.getElementById("sceneLabel");
  var progFill     = document.getElementById("progFill");

  function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
  function scrollDown() { requestAnimationFrame(function() { chatArea.scrollTop = chatArea.scrollHeight; }); }

  // ---- SCENE DEFINITIONS ----
  function buildScenes() {
    return [

      // ================================================================
      // SZENE 1: Sekretariat — Frau Berger
      // ================================================================
      {
        emoji: "\uD83C\uDFE2", label: "Szene 1: Im Sekretariat",
        npcName: "Frau Berger", npcAvatar: "\uD83D\uDC69\u200D\uD83D\uDCBC",
        intro: "Du gehst zuerst ins Sekretariat.",
        steps: [
          {
            npcText: "Guten Morgen! Was kann ich f\u00FCr dich tun?",
            placeholder: "Ich suche meine Schultasche.",
            baseChips: ["Ich", "suche", "meine"],
            hintChips: ["Schultasche"],
            check: function(input) {
              var low = input.toLowerCase().trim();
              if (low.indexOf("schultasche") !== -1) return { pass: true };
              if (low.indexOf("tasche") !== -1) return { pass: true, npcReply: "Ah, deine Schultasche! Ich verstehe." };
              return { pass: false, npcReply: "Was suchst du? Sag: Ich suche meine Schultasche." };
            }
          },
          {
            npcText: "Oh! Wie ist dein Name, bitte?",
            placeholder: "Ich hei\u00DFe...",
            baseChips: ["Ich", "hei\u00DFe", "bin"],
            hintChips: ["Mein", "Name", "ist", player.firstName, player.lastName],
            check: (function() {
              var gotFirst = false, gotLast = false;
              return function(input) {
                var low = input.toLowerCase().trim();
                var hasFirst = low.indexOf(player.firstName.toLowerCase()) !== -1;
                var hasLast  = low.indexOf(player.lastName.toLowerCase()) !== -1;
                if (hasFirst) gotFirst = true;
                if (hasLast)  gotLast  = true;
                if (gotFirst && gotLast)  return { pass: true };
                if (gotFirst && !gotLast) return { pass: false, npcReply: "Und dein Nachname?" };
                if (gotLast  && !gotFirst)return { pass: false, npcReply: "Und dein Vorname?" };
                return { pass: false, npcReply: "Sag mir bitte Vor- und Nachnamen." };
              };
            })()
          },
          {
            npcText: function() { return "Und in welche Klasse gehst du, " + player.firstName + "?"; },
            placeholder: "Ich gehe in die ...",
            baseChips: ["Ich", "gehe", "in die"],
            hintChips: [player.playerClass],
            check: function(input) {
              var low = input.toLowerCase().trim();
              var cl = player.playerClass.toLowerCase();
              var hasClass    = low.indexOf(cl) !== -1;
              var hasSentence = low.indexOf("gehe") !== -1 || low.indexOf("klasse") !== -1 || low.indexOf("bin in") !== -1;
              if (hasClass && hasSentence) return { pass: true };
              if (hasClass) return { pass: false, npcReply: "Gut! Aber sag einen ganzen Satz: Ich gehe in die " + player.playerClass + "." };
              return { pass: false, npcReply: "Sag zum Beispiel: Ich gehe in die " + player.playerClass + "." };
            }
          },
          {
            npcText: function() { return "Eine Schultasche? Nein, die habe ich nicht. Schau in deinem Klassenzimmer nach! Vielleicht liegt sie noch dort. Sag: Ich gehe ins Klassenzimmer."; },
            placeholder: "Ich gehe ins Klassenzimmer.",
            baseChips: ["Ich", "gehe", "ins"],
            hintChips: ["Klassenzimmer", "Danke"],
            check: function(input) {
              var low = input.toLowerCase().trim();
              if (low.indexOf("klassenzimmer") !== -1) return { pass: true };
              if (low.indexOf("klasse") !== -1) return { pass: true };
              return { pass: false, npcReply: "Sag: Ich gehe ins Klassenzimmer." };
            }
          }
        ],
        outro: "Du gehst die Treppe hoch. Erster Raum: kein Erfolg."
      },

      // ================================================================
      // SZENE 2: Klassenzimmer — Frau Wagner
      // ================================================================
      {
        emoji: "\uD83D\uDCDA", label: "Szene 2: Im Klassenzimmer",
        npcName: "Frau Wagner", npcAvatar: "\uD83D\uDC69\u200D\uD83C\uDFEB",
        intro: "Du gehst ins Klassenzimmer. Frau Wagner ist schon da.",
        steps: [
          {
            npcText: function() { return "Guten Morgen, " + player.firstName + "! So fr\u00FCh schon hier?"; },
            placeholder: "Guten Morgen! Ich suche meine Schultasche.",
            baseChips: ["Guten", "Morgen", "Ich", "suche", "meine"],
            hintChips: ["Schultasche"],
            check: function(input) {
              var low = input.toLowerCase().trim();
              var hasGreeting = /guten\s*morgen|gr\u00FC\u00DF\s*gott|guten\s*tag/.test(low);
              var hasBag = low.indexOf("schultasche") !== -1 || low.indexOf("tasche") !== -1;
              if (hasGreeting && hasBag) return { pass: true };
              if (!hasGreeting) return { pass: false, npcReply: "Vergiss den Gru\u00DF nicht! Sag zuerst: Guten Morgen!" };
              return { pass: false, npcReply: "Was suchst du? Sag: Ich suche meine Schultasche." };
            }
          },
          {
            npcText: "Hmm, eine Schultasche? Ich habe hier keine gesehen. Frag den Schulwart! Er ist auf dem Gang. Sag: Ich gehe auf den Gang.",
            placeholder: "Ich gehe auf den Gang.",
            baseChips: ["Ich", "gehe", "auf den"],
            hintChips: ["Gang", "Danke sch\u00F6n"],
            check: function(input) {
              var low = input.toLowerCase().trim();
              if (low.indexOf("gang") !== -1) return { pass: true };
              return { pass: false, npcReply: "Sag: Ich gehe auf den Gang." };
            }
          }
        ],
        outro: "Du gehst hinaus auf den Gang. Zweiter Raum: kein Erfolg."
      },

      // ================================================================
      // SZENE 3: Gang — Schulwart Herr Moser
      // ================================================================
      {
        emoji: "\uD83D\uDEAA", label: "Szene 3: Auf dem Gang",
        npcName: "Herr Moser", npcAvatar: "\uD83E\uDDD1\u200D\uD83D\uDD27",

  var SCENES = [];

  function totalStepCount() {
    var n = 0;
    for (var i = 0; i < SCENES.length; i++) n += SCENES[i].steps.length;
    return n;
  }
  function doneStepCount() {
    var n = 0;
    for (var i = 0; i < sceneIdx; i++) n += SCENES[i].steps.length;
    return n + stepIdx;
  }
  function updateProg() {
    progFill.style.width = Math.round((doneStepCount() / totalStepCount()) * 100) + "%";
  }

  // ---- RENDERING ----
  function el(tag, cls, html) {
    var d = document.createElement(tag);
    if (cls) d.className = cls;
    if (html !== undefined) d.innerHTML = html;
    return d;
  }
  function addNpc(text, name, avatar) {
    var d = el("div", "msg npc", '<div class="av">' + avatar + '</div><div class="bub"><div class="spk">' + name + '</div>' + text + '</div>');
    chatArea.appendChild(d); scrollDown();
  }
  function addPlayer(text) {
    var d = el("div", "msg player", '<div class="av">' + player.emoji + '</div><div class="bub">' + text + '</div>');
    chatArea.appendChild(d); scrollDown();
  }
  function addNarration(text) {
    var d = el("div", "narr"); d.textContent = text;
    chatArea.appendChild(d); scrollDown();
  }
  function addSuccess(text) {
    var d = el("div", "fb-inline success"); d.textContent = text;
    chatArea.appendChild(d); scrollDown();
  }
  function addSceneHeader(scene) {
    var d = el("div", "scene-hdr", '<div class="em">' + scene.emoji + '</div><div class="ttl">' + scene.label + '</div>');
    chatArea.appendChild(d); scrollDown();
  }
  function addRoomMap() {
    var rooms = [
      { label: "\uD83C\uDFE2 Sekretariat",   done: sceneIdx > 0 },
      { label: "\uD83D\uDCDA Klassenzimmer", done: sceneIdx > 1 },
      { label: "\uD83D\uDEAA Gang + WC",     done: sceneIdx > 2 },
      { label: "\uD83E\uDD3E Turnsaal",      done: sceneIdx > 3 },
      { label: "\uD83E\uDEDC Stiege",        done: sceneIdx > 4 },
      { label: "\uD83D\uDCDA Bibliothek",    done: sceneIdx > 5 },
      { label: "\u2600\uFE0F Pausenhof",     done: sceneIdx > 6 },
      { label: "\uD83D\uDCCB Direktion",     done: sceneIdx > 7 }
    ];
    var html = "<strong>\uD83D\uDDFA\uFE0F Schon gesucht:</strong>";
    for (var i = 0; i < rooms.length; i++) {
      html += '<span class="' + (rooms[i].done ? "room-found" : "") + '">' + rooms[i].label + (rooms[i].done ? " \u2714\uFE0F" : " ...") + "</span>  ";
    }
    var d = el("div", "room-map", html);
    chatArea.appendChild(d); scrollDown();
  }
  function addChoiceButtons(choices) {
    var wrap = el("div", "choice-wrap");
    for (var i = 0; i < choices.length; i++) {
      (function(ch) {
        var b = document.createElement("button");
        b.className = "choice-btn" + (ch.cls ? " " + ch.cls : "");
        b.textContent = ch.label;
        b.addEventListener("click", function() { wrap.remove(); ch.action(); });
        wrap.appendChild(b);
      })(choices[i]);
    }
    chatArea.appendChild(wrap); scrollDown();
  }
  function showTyping(avatar) {
    var d = el("div", "msg npc", '<div class="av">' + avatar + '</div><div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>');
    chatArea.appendChild(d); scrollDown();
    return d;
  }
  function setChips(baseWords, hintWords, showHints) {
    chipsEl.innerHTML = "";
    for (var i = 0; i < baseWords.length; i++) {
      (function(w) {
        var b = document.createElement("button");
        b.className = "chip";
        b.textContent = w;
        b.addEventListener("click", function() {
          var cur = userInput.value;
          userInput.value = cur + (cur && !cur.endsWith(" ") ? " " : "") + w;
          b.classList.add("used");
          userInput.focus();
        });
        chipsEl.appendChild(b);
      })(baseWords[i]);
    }
    if (showHints && hintWords && hintWords.length > 0) {
      for (var j = 0; j < hintWords.length; j++) {
        (function(w) {
          var b = document.createElement("button");
          b.className = "chip hint-chip";
          b.textContent = w;
          b.addEventListener("click", function() {
            var cur = userInput.value;
            userInput.value = cur + (cur && !cur.endsWith(" ") ? " " : "") + w;
            b.classList.add("used");
            userInput.focus();
          });
          chipsEl.appendChild(b);
        })(hintWords[j]);
      }
      helpsLbl.innerHTML = "&#x1F4A1; Zusatz-Hilfe!";
    } else {
      helpsLbl.innerHTML = "&#x1F4A1; W\u00F6rter zum Antippen";
    }
  }
  function lockInput(lock) {
    inputLocked = lock;
    userInput.disabled = lock;
    sendBtn.disabled = lock;
    if (!lock) userInput.focus();
  }
  function showScreen(name) {
    avatarScreen.style.display = name === "avatar" ? "flex" : "none";
    gameScreen.style.display   = name === "game"   ? "flex" : "none";
    endScreen.style.display    = name === "end"     ? "flex" : "none";
  }

  // ---- GAME FLOW ----
  var thinkMessages = [
    "Du erinnerst dich: Gestern warst du im Sekretariat, im Klassenzimmer, im Turnsaal ...",
    "Vielleicht liegt sie auf dem Gang? Oder auf der Stiege? Oder im Turnsaal?",
    "Du denkst: War ich in der Bibliothek? Auf dem Pausenhof? Oder in der Direktion?",
    "Irgendwo muss sie sein! Fang mit dem Sekretariat an \u2014 Frau Berger wei\u00DF alles!",
    "Du schaust in deiner Hosentasche nach. Nur ein Kaugummi. Das ist nicht die Schultasche. \uD83E\uDD14"
  ];
  var thinkIdx = 0;

  function runIntro() {
    sceneEmojiEl.textContent = "\uD83D\uDC4B";
    sceneLabelEl.textContent = "Kapitel 2";
    updateProg();
    addSceneHeader({ emoji: "\uD83C\uDF92", label: "Wo ist meine Schultasche?" });
    wait(400).then(function() {
      addNarration("Es ist dein zweiter Schultag. Du kommst in die Schule \u2014 und merkst: Deine Schultasche ist weg! Wo hast du sie gestern gelassen?");
      return wait(1000);
    }).then(function() {
      showIntroChoices();
    });
  }

  function showIntroChoices() {
    lockInput(true);
    setChips([], [], false);
    helpsLbl.innerHTML = "";
    addChoiceButtons([
      {
        label: "\uD83C\uDFE2 Geh ins Sekretariat",
        action: function() {
          addNarration("Du gehst zum Sekretariat. Vielleicht wurde die Tasche dort abgegeben.");
          wait(1000).then(function() { startScene(); });
        }
      },
      {
        label: "\uD83E\uDD14 Nachdenken ...",
        cls: "sec",
        action: function() {
          addNarration(thinkMessages[thinkIdx % thinkMessages.length]);
          thinkIdx++;
          wait(800).then(function() { showIntroChoices(); });
        }
      }
    ]);
  }

  function startGame() {
    SCENES = buildScenes();
    sceneIdx = 0; stepIdx = 0; totalMsgs = 0; inputLocked = false;
    attempts = 0; totalChecks = 0; firstTryPasses = 0; thinkIdx = 0;
    chatArea.innerHTML = "";
    showScreen("game");
    runIntro();
  }

  function startScene() {
    var scene = SCENES[sceneIdx];
    sceneEmojiEl.textContent = scene.emoji;
    sceneLabelEl.textContent  = scene.label;
    updateProg();
    addSceneHeader(scene);
    // Show room map from scene 2 onwards so kids can track progress
    if (sceneIdx >= 1) { addRoomMap(); }
    if (scene.intro) { addNarration(scene.intro); }
    wait(800).then(function() { startStep(); });
  }

  function startStep() {
    var scene = SCENES[sceneIdx];
    var step  = scene.steps[stepIdx];
    if (!step) return;
    attempts = 0;

    if (step.autoPass) {
      lockInput(true);
      var npcName   = step.npcNameOverride || scene.npcName;
      var npcAvatar = step.npcAvatarOverride || scene.npcAvatar;
      var txt = typeof step.npcText === "function" ? step.npcText() : step.npcText;
      var typ = showTyping(npcAvatar);
      wait(800).then(function() {
        typ.remove();
        addNpc(txt, npcName, npcAvatar);
        if (step.afterPass) { return showExtras(step.afterPass(), 0); }
      }).then(function() {
        return wait(800);
      }).then(function() { advanceStep(); });
      return;
    }

    lockInput(true);
    var npcName   = step.npcNameOverride || scene.npcName;
    var npcAvatar = step.npcAvatarOverride || scene.npcAvatar;
    var npcText   = typeof step.npcText === "function" ? step.npcText() : step.npcText;

    var p = Promise.resolve();
    if (step.narrateBefore) {
      p = p.then(function() { addNarration(step.narrateBefore); return wait(800); });
    }
    p.then(function() {
      var typ2 = showTyping(npcAvatar);
      return wait(800 + Math.random() * 400).then(function() {
        typ2.remove();
        addNpc(npcText, npcName, npcAvatar);
        setChips(step.baseChips, step.hintChips, false);
        userInput.placeholder = step.placeholder;
        userInput.value = "";
        lockInput(false);
      });
    });
  }

  function showExtras(extras, idx) {
    if (idx >= extras.length) return Promise.resolve();
    var item = extras[idx];
    return wait(600).then(function() {
      if (item.type === "narr") { addNarration(item.text); }
      else if (item.type === "npc") { addNpc(item.text, item.name, item.avatar); }
      return showExtras(extras, idx + 1);
    });
  }

  function doSend() {
    if (inputLocked) return;
    var text = userInput.value.trim();
    if (!text) return;
    var scene = SCENES[sceneIdx];
    var step  = scene.steps[stepIdx];
    addPlayer(text);
    totalMsgs++;
    userInput.value = "";
    lockInput(true);

    var result = step.check(text);
    attempts++;

    if (result.pass) {
      totalChecks++;
      if (attempts === 1) firstTryPasses++;
      var sNpcName   = step.npcNameOverride || scene.npcName;
      var sNpcAvatar = step.npcAvatarOverride || scene.npcAvatar;
      wait(300).then(function() {
        if (result.npcReply) { addNpc(result.npcReply, sNpcName, sNpcAvatar); }
        addSuccess("\u2705 Weiter geht's!");
        if (step.afterPass) { return showExtras(step.afterPass(), 0); }
      }).then(function() {
        return wait(800);
      }).then(function() { advanceStep(); });
    } else {
      var rNpcName   = step.npcNameOverride || scene.npcName;
      var rNpcAvatar = step.npcAvatarOverride || scene.npcAvatar;
      var typ = showTyping(rNpcAvatar);
      wait(800).then(function() {
        typ.remove();
        addNpc(result.npcReply, rNpcName, rNpcAvatar);
        if (attempts >= 1) { setChips(step.baseChips, step.hintChips, true); }
        userInput.value = "";
        lockInput(false);
      });
    }
  }

  function advanceStep() {
    var scene = SCENES[sceneIdx];
    stepIdx++;
    updateProg();
    if (stepIdx >= scene.steps.length) { finishScene(); }
    else { startStep(); }
  }

  function finishScene() {
    var scene = SCENES[sceneIdx];
    var outro = typeof scene.outro === "function" ? scene.outro() : scene.outro;
    var p;
    if (outro) {
      p = wait(400).then(function() { addNarration(outro); return wait(1500); });
    } else {
      p = wait(600);
    }
    if (scene.afterOutro) {
      p = p.then(function() { return showExtras(scene.afterOutro(), 0); }).then(function() { return wait(1200); });
    }
    p.then(function() {
      sceneIdx++; stepIdx = 0;
      if (sceneIdx >= SCENES.length) { finishGame(); }
      else { startScene(); }
    });
  }

  function finishGame() {
    updateProg();
    showScreen("end");
    var pct = totalChecks > 0 ? Math.round((firstTryPasses / totalChecks) * 100) : 0;
    var msg;
    if (pct >= 80) {
      msg = "Wow, " + player.firstName + "! Du hast fast alles beim ersten Versuch geschafft. Und du kennst jetzt alle R\u00E4ume!";
    } else if (pct >= 50) {
      msg = "Gut gemacht, " + player.firstName + "! Du kennst jetzt alle R\u00E4ume der Schule. Weiter so!";
    } else {
      msg = "Super, " + player.firstName + "! Die Schultasche ist wieder da. \u00DCbung macht den Meister!";
    }
    document.getElementById("endText").textContent = msg;
    document.getElementById("sScore").textContent  = pct + "%";
    document.getElementById("sRooms").textContent  = "8";
    document.getElementById("sMsgs").textContent   = totalMsgs;
  }

  // ---- EVENTS ----
  document.getElementById("restartBtn").addEventListener("click", function() { showScreen("avatar"); });
  sendBtn.addEventListener("click", function() { doSend(); });
  userInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
  });

})();
</script>
</body>
</html>
